groups:
  - name: infrastructure
    rules:
      - alert: RedisHitRateLow
        expr: redis_cache_hit_rate < 0.95
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis cache hit rate below 95%"
          description: "Redis hit rate is {{ $value | humanizePercentage }}. Target: > 95%."

      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 10000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer lag > 10K messages"
          description: "Consumer group {{ $labels.consumer_group }} has {{ $value }} pending messages on topic {{ $labels.topic }}."

      - alert: AuroraReplicaLag
        expr: aws_rds_replica_lag_seconds > 1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Aurora replica lag > 1 second"

      - alert: HikariPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "HikariCP connection pool > 90% utilized"

      - alert: HighCPUUsage
        expr: process_cpu_usage > 0.8
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "CPU usage above 80% for 10 minutes"
