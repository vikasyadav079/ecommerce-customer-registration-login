groups:
  - name: auth-slo
    rules:
      - alert: AuthSLOBurnRate
        expr: |
          (
            1 - (
              rate(http_server_requests_seconds_count{status=~"5..", uri=~"/api/v1/auth/.*"}[5m])
              /
              rate(http_server_requests_seconds_count{uri=~"/api/v1/auth/.*"}[5m])
            )
          ) < 0.9999
        for: 5m
        labels:
          severity: critical
          team: identity
        annotations:
          summary: "Auth SLO burn rate exceeded (99.99% availability target)"
          description: "Auth endpoint error rate exceeds 0.01% for 5 minutes. Current availability: {{ $value | humanizePercentage }}"

      - alert: AuthErrorBudgetLow
        expr: |
          (
            1 - (
              increase(http_server_requests_seconds_count{status=~"5..", uri=~"/api/v1/auth/.*"}[30d])
              /
              increase(http_server_requests_seconds_count{uri=~"/api/v1/auth/.*"}[30d])
            )
          ) < 0.99995
        for: 15m
        labels:
          severity: warning
          team: identity
        annotations:
          summary: "Auth error budget below 50% for 30-day window"
