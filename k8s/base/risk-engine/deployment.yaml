apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: ecommerce-ciam
  labels:
    app: risk-engine
    app.kubernetes.io/name: risk-engine
    app.kubernetes.io/component: risk
    app.kubernetes.io/part-of: ecommerce-ciam
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: risk-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: risk-engine
        app.kubernetes.io/name: risk-engine
        app.kubernetes.io/component: risk
        app.kubernetes.io/part-of: ecommerce-ciam
        version: "1.0.0"
      annotations:
        sidecar.istio.io/inject: "true"
        sidecar.istio.io/proxyCPU: "100m"
        sidecar.istio.io/proxyMemory: "128Mi"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      serviceAccountName: risk-engine-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - risk-engine
                topologyKey: kubernetes.io/hostname

      containers:
        - name: risk-engine
          image: ecommerce-ciam/risk-engine:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes,prod"
            - name: SPRING_APPLICATION_NAME
              value: "risk-engine"
            - name: SERVER_PORT
              value: "8080"
            - name: MANAGEMENT_SERVER_PORT
              value: "8081"
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"

            # JVM Options - risk engine is CPU-intensive for ML model inference
            - name: JAVA_OPTS
              value: >-
                -XX:+UseZGC
                -XX:+ZGenerational
                -Xms1g
                -Xmx3g
                -XX:MaxMetaspaceSize=256m
                -XX:+ExitOnOutOfMemoryError
                -XX:ActiveProcessorCount=2
                -Djava.security.egd=file:/dev/./urandom

            # Database (read replica for risk scoring)
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: risk-engine-db-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: risk-engine-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: risk-engine-db-secret
                  key: password

            # Redis for geolocation and device fingerprint cache
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: risk-engine-redis-secret
                  key: host
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: risk-engine-redis-secret
                  key: port
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: risk-engine-redis-secret
                  key: password

            # Kafka for risk events
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: risk-engine-kafka-secret
                  key: bootstrap-servers
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: "risk-engine-group"

            # Risk engine thresholds
            - name: RISK_SCORE_HIGH_THRESHOLD
              value: "70"
            - name: RISK_SCORE_CRITICAL_THRESHOLD
              value: "90"
            - name: RISK_GEO_IP_DB_PATH
              value: "/app/data/GeoLite2-City.mmdb"
            - name: RISK_MODEL_PATH
              value: "/app/models/risk-model.onnx"

            # External threat intelligence
            - name: RISK_THREAT_INTEL_API_URL
              valueFrom:
                secretKeyRef:
                  name: risk-engine-threat-secret
                  key: api-url
                  optional: true
            - name: RISK_THREAT_INTEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: risk-engine-threat-secret
                  key: api-key
                  optional: true

            # Pod metadata
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 25

          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            - name: logs-dir
              mountPath: /app/logs
            - name: models-dir
              mountPath: /app/models
              readOnly: true
            - name: data-dir
              mountPath: /app/data
              readOnly: true

          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 5

      volumes:
        - name: tmp-dir
          emptyDir:
            sizeLimit: 512Mi
        - name: logs-dir
          emptyDir:
            sizeLimit: 1Gi
        - name: models-dir
          configMap:
            name: risk-engine-models
            optional: true
        - name: data-dir
          configMap:
            name: risk-engine-data
            optional: true

      imagePullSecrets:
        - name: registry-credentials
