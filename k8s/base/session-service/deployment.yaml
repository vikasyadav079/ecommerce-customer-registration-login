apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-service
  namespace: ecommerce-ciam
  labels:
    app: session-service
    app.kubernetes.io/name: session-service
    app.kubernetes.io/component: session
    app.kubernetes.io/part-of: ecommerce-ciam
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: session-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: session-service
        app.kubernetes.io/name: session-service
        app.kubernetes.io/component: session
        app.kubernetes.io/part-of: ecommerce-ciam
        version: "1.0.0"
      annotations:
        sidecar.istio.io/inject: "true"
        sidecar.istio.io/proxyCPU: "100m"
        sidecar.istio.io/proxyMemory: "128Mi"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      serviceAccountName: session-service-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - session-service
                topologyKey: kubernetes.io/hostname

      containers:
        - name: session-service
          image: ecommerce-ciam/session-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes,prod"
            - name: SPRING_APPLICATION_NAME
              value: "session-service"
            - name: SERVER_PORT
              value: "8080"
            - name: MANAGEMENT_SERVER_PORT
              value: "8081"
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"

            # JVM Options with ZGC
            - name: JAVA_OPTS
              value: >-
                -XX:+UseZGC
                -XX:+ZGenerational
                -Xms1g
                -Xmx3g
                -XX:MaxMetaspaceSize=256m
                -XX:+ExitOnOutOfMemoryError
                -Djava.security.egd=file:/dev/./urandom

            # Redis - primary session store
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: session-service-redis-secret
                  key: host
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: session-service-redis-secret
                  key: port
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: session-service-redis-secret
                  key: password
            - name: SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE
              value: "16"
            - name: SPRING_DATA_REDIS_TIMEOUT
              value: "2000ms"

            # Session Configuration
            - name: SESSION_MAX_INACTIVE_INTERVAL_SECONDS
              value: "1800"
            - name: SESSION_COOKIE_SECURE
              value: "true"
            - name: SESSION_COOKIE_HTTP_ONLY
              value: "true"
            - name: SESSION_COOKIE_SAME_SITE
              value: "Strict"

            # Kafka
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: session-service-kafka-secret
                  key: bootstrap-servers

            # Pod metadata
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
              scheme: HTTP
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20

          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            - name: logs-dir
              mountPath: /app/logs

          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 5

      volumes:
        - name: tmp-dir
          emptyDir:
            sizeLimit: 512Mi
        - name: logs-dir
          emptyDir:
            sizeLimit: 1Gi

      imagePullSecrets:
        - name: registry-credentials
