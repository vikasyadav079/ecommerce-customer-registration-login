apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service-hpa
  namespace: ecommerce-ciam
  labels:
    app: identity-service
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: ecommerce-ciam
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-service

  minReplicas: 4
  maxReplicas: 30

  metrics:
    # CPU-based scaling — target 60% utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    # Memory-based scaling — target 75% utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

    # Custom metric — RPS per pod (target 2000 RPS)
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "2000"

    # External metric — total inbound RPS from Istio/Prometheus
    - type: External
      external:
        metric:
          name: istio_requests_total_rate
          selector:
            matchLabels:
              destination_service_name: identity-service
              destination_service_namespace: ecommerce-ciam
        target:
          type: AverageValue
          averageValue: "2000"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
        - type: Pods
          value: 2
          periodSeconds: 120
      selectPolicy: Min
