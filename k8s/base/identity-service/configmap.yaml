apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  namespace: ecommerce-ciam
  labels:
    app: identity-service
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: ecommerce-ciam
data:
  # Spring Boot Configuration
  SPRING_PROFILES_ACTIVE: "kubernetes,prod"
  SPRING_APPLICATION_NAME: "identity-service"

  # JVM Configuration with ZGC
  JAVA_OPTS: >-
    -XX:+UseZGC
    -XX:+ZGenerational
    -Xms2g
    -Xmx6g
    -XX:MaxMetaspaceSize=512m
    -XX:+ExitOnOutOfMemoryError
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/tmp/heapdump.hprof
    -Djava.security.egd=file:/dev/./urandom
    -Dfile.encoding=UTF-8
    -Dspring.backgroundpreinitializer.ignore=true
    -XX:+UnlockDiagnosticVMOptions
    -XX:GuaranteedSafepointInterval=0
    -Dcom.sun.jndi.ldap.object.trustURLCodebase=false

  # Server Configuration
  SERVER_PORT: "8080"
  MANAGEMENT_SERVER_PORT: "8081"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"

  # Database Pool Configuration
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "600000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"

  # Redis Configuration
  SPRING_DATA_REDIS_TIMEOUT: "2000ms"
  SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE: "16"
  SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE: "8"
  SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE: "2"

  # Kafka Configuration
  SPRING_KAFKA_PRODUCER_ACKS: "all"
  SPRING_KAFKA_PRODUCER_RETRIES: "3"
  SPRING_KAFKA_PRODUCER_BATCH_SIZE: "16384"
  SPRING_KAFKA_PRODUCER_LINGER_MS: "5"
  SPRING_KAFKA_PRODUCER_COMPRESSION_TYPE: "lz4"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "identity-service-group"
  SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: "earliest"
  SPRING_KAFKA_CONSUMER_MAX_POLL_RECORDS: "500"

  # Logging
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_ORG_EXAMPLE: "INFO"
  LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  # CIAM Specific
  CIAM_TOKEN_ACCESS_EXPIRY_MINUTES: "15"
  CIAM_TOKEN_REFRESH_EXPIRY_DAYS: "30"
  CIAM_PASSWORD_POLICY_MIN_LENGTH: "12"
  CIAM_MFA_TOTP_ISSUER: "ECommerce-CIAM"
  CIAM_SESSION_MAX_CONCURRENT: "5"
  CIAM_RATE_LIMIT_LOGIN_ATTEMPTS: "5"
  CIAM_RATE_LIMIT_WINDOW_SECONDS: "300"
