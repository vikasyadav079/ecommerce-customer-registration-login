apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ecommerce-ciam
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: ecommerce-ciam
  annotations:
    # Cloud-provider load balancer annotations (AWS example — adjust per cloud)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "60"
    # External DNS
    external-dns.alpha.kubernetes.io/hostname: "api.ecommerce-ciam.example.com"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
    - name: https
      protocol: TCP
      port: 443
      targetPort: http
    - name: management
      protocol: TCP
      port: 8081
      targetPort: management
  # Preserve client source IPs for rate limiting and audit logging
  externalTrafficPolicy: Local
  sessionAffinity: None
