apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: ecommerce-ciam-gateway
  namespace: ecommerce-ciam
  labels:
    app.kubernetes.io/part-of: ecommerce-ciam
    app.kubernetes.io/component: ingress
spec:
  # Select the default Istio ingress gateway deployment
  selector:
    istio: ingressgateway

  servers:
    # HTTPS traffic — primary entry point
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: ecommerce-ciam-tls-secret  # k8s secret with TLS cert/key
        minProtocolVersion: TLSV1_2
        cipherSuites:
          - ECDHE-ECDSA-AES256-GCM-SHA384
          - ECDHE-RSA-AES256-GCM-SHA384
          - ECDHE-ECDSA-CHACHA20-POLY1305
          - ECDHE-RSA-CHACHA20-POLY1305
          - ECDHE-ECDSA-AES128-GCM-SHA256
          - ECDHE-RSA-AES128-GCM-SHA256
      hosts:
        - "api.ecommerce-ciam.example.com"
        - "auth.ecommerce-ciam.example.com"
        - "admin.ecommerce-ciam.example.com"

    # HTTP — redirect to HTTPS
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - "api.ecommerce-ciam.example.com"
        - "auth.ecommerce-ciam.example.com"
        - "admin.ecommerce-ciam.example.com"

    # Internal mTLS port for service-to-service (east-west)
    - port:
        number: 15443
        name: tls-passthrough
        protocol: TLS
      tls:
        mode: PASSTHROUGH
      hosts:
        - "*.ecommerce-ciam.svc.cluster.local"
