---
# Namespace-wide STRICT mTLS policy
# All pods in ecommerce-ciam must use mutual TLS — no plaintext traffic permitted
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: ecommerce-ciam-strict-mtls
  namespace: ecommerce-ciam
  labels:
    app.kubernetes.io/part-of: ecommerce-ciam
    app.kubernetes.io/component: security
spec:
  mtls:
    mode: STRICT

---
# Per-service STRICT mTLS — identity-service
# Redundant with namespace policy but explicit for compliance documentation
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: identity-service-mtls
  namespace: ecommerce-ciam
  labels:
    app: identity-service
    app.kubernetes.io/part-of: ecommerce-ciam
spec:
  selector:
    matchLabels:
      app: identity-service
  mtls:
    mode: STRICT
  # Allow management port to be accessed without mTLS from Prometheus scraper
  portLevelMtls:
    8081:
      mode: PERMISSIVE

