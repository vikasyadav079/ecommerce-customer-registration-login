---
# Destination Rule — identity-service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: identity-service-dr
  namespace: ecommerce-ciam
  labels:
    app: identity-service
    app.kubernetes.io/part-of: ecommerce-ciam
spec:
  host: identity-service
  trafficPolicy:
    # mTLS for all traffic to this service
    tls:
      mode: ISTIO_MUTUAL
    # Connection pool settings to prevent cascading failures
    connectionPool:
      tcp:
        maxConnections: 500
        connectTimeout: 5s
        tcpKeepalive:
          time: 7200s
          interval: 75s
      http:
        http1MaxPendingRequests: 200
        http2MaxRequests: 1000
        maxRequestsPerConnection: 100
        maxRetries: 3
        idleTimeout: 90s
        h2UpgradePolicy: UPGRADE
    # Circuit breaker — outlier detection
    outlierDetection:
      consecutive5xxErrors: 5
      consecutiveGatewayErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
      splitExternalLocalOriginErrors: true
  subsets:
    - name: stable
      labels:
        app: identity-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: canary
      labels:
        app: identity-service
        version: canary
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL

