---
# Destination Rule — risk-engine
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: risk-engine-dr
  namespace: ecommerce-ciam
  labels:
    app: risk-engine
    app.kubernetes.io/part-of: ecommerce-ciam
spec:
  host: risk-engine
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 200
        connectTimeout: 2s
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 200
        maxRequestsPerConnection: 20
        # Fail fast for risk engine to avoid blocking auth flows
        maxRetries: 1
        idleTimeout: 30s
    # Aggressive circuit breaker — risk engine must not degrade auth latency
    outlierDetection:
      consecutive5xxErrors: 3
      consecutiveGatewayErrors: 2
      interval: 5s
      baseEjectionTime: 15s
      maxEjectionPercent: 50
      minHealthPercent: 60
  subsets:
    - name: stable
      labels:
        app: risk-engine
    - name: canary
      labels:
        app: risk-engine
        version: canary

