---
# Internal routing for risk-engine
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: risk-engine-vs
  namespace: ecommerce-ciam
  labels:
    app: risk-engine
    app.kubernetes.io/part-of: ecommerce-ciam
spec:
  hosts:
    - risk-engine
  http:
    - name: risk-route
      route:
        - destination:
            host: risk-engine
            port:
              number: 8080
            subset: stable
          weight: 100
      # Risk engine has a strict SLA — fail fast rather than retry
      timeout: 3s
      retries:
        attempts: 1
        perTryTimeout: 2s
        retryOn: "connect-failure,refused-stream"

