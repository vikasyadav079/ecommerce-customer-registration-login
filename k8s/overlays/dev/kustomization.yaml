apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-ciam-dev

resources:
  - ../../base

namePrefix: ""
nameSuffix: ""

commonLabels:
  environment: dev

commonAnnotations:
  environment: dev

# Patch replica counts to 1 for all deployments in dev
patches:
  # ---- Identity Service ----
  - target:
      kind: Deployment
      name: identity-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "kubernetes,dev"

  - target:
      kind: HorizontalPodAutoscaler
      name: identity-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # ---- Session Service ----
  - target:
      kind: Deployment
      name: session-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  - target:
      kind: HorizontalPodAutoscaler
      name: session-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # ---- Risk Engine ----
  - target:
      kind: Deployment
      name: risk-engine
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  - target:
      kind: HorizontalPodAutoscaler
      name: risk-engine-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # ---- Notification Service ----
  - target:
      kind: Deployment
      name: notification-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # ---- Audit Service ----
  - target:
      kind: Deployment
      name: audit-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # ---- API Gateway ----
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

  - target:
      kind: HorizontalPodAutoscaler
      name: api-gateway-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # ---- Namespace ----
  - target:
      kind: Namespace
      name: ecommerce-ciam
    patch: |-
      - op: replace
        path: /metadata/name
        value: ecommerce-ciam-dev

# ConfigMap patches for dev-specific configuration
configMapGenerator:
  - name: identity-service-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=kubernetes,dev
      - LOGGING_LEVEL_ORG_EXAMPLE=DEBUG
      - CIAM_TOKEN_ACCESS_EXPIRY_MINUTES=60
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5

images:
  - name: ecommerce-ciam/identity-service
    newTag: dev-latest
  - name: ecommerce-ciam/session-service
    newTag: dev-latest
  - name: ecommerce-ciam/risk-engine
    newTag: dev-latest
  - name: ecommerce-ciam/notification-service
    newTag: dev-latest
  - name: ecommerce-ciam/audit-service
    newTag: dev-latest
  - name: ecommerce-ciam/api-gateway
    newTag: dev-latest
