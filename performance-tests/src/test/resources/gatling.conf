gatling {
  core {
    outputDirectoryBaseName = "gatling-results"
    runDescription = "ECommerce CIAM Performance Test"
    encoding = "utf-8"
  }
  http {
    fetchedCssCacheMaxCapacity = 100
    fetchedHtmlCacheMaxCapacity = 100
    perUserCacheMaxCapacity = 100
    warmUpUrl = ""
  }
  data {
    writers = [console, file]
    console {
      light = false
      writePeriod = 5
    }
  }
}
