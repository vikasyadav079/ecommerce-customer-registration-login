# =============================================
# Staging Profile
# =============================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:ecommerce_db}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  security:
    jwt:
      public-key: ${JWT_PUBLIC_KEY_PATH}
      private-key: ${JWT_PRIVATE_KEY_PATH}
      issuer: ecommerce-ciam-staging
      access-token-expiry: 15m
      refresh-token-expiry: 7d
    cors:
      allowed-origins:
        - https://staging.ecommerce.com

logging:
  level:
    org.example: INFO
    org.springframework.web: WARN
