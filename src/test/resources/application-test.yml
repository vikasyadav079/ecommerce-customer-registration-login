# Test profile configuration
spring:
  datasource:
    url: jdbc:h2:mem:ecommerce_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

  session:
    store-type: none

# Disable security auto-config for unit tests
app:
  security:
    jwt:
      public-key: classpath:keys/dev-public.pem
      private-key: classpath:keys/dev-private.pem

logging:
  level:
    root: WARN
    org.example: INFO
